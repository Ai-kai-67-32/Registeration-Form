<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UFT-8">
    <meta name="viewprt" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css" />
    <title>Registeration Form </title>
</head>

<body>
    <h1>Registeration Form</h1>
    <p>“Please fill out this form with the required information”</p>
    <form method="post" action='https://register-demo.org'>
        <fieldset>
            <label for="first-name">Enter Your First Name: <input id="first-name" name="first-name" type="text" required /> </label>
            <label for="Last-name">Enter Your Last Name: <input id="Last-name" name="Last-name" type="text" required /> </label>
            <label for="email">Enter Your Email: <input id="email" name="email" type="email" required /> </label>
            <label for="new-password">Create a New Password: <input id="new-password" name="password" type="password" pattern=""[a-z0-5]{8,} required /> </label>
        </fieldset>
        <fieldset>
            <legend>Account type (required)</legend>
            <label for="personal-account"><input id="personal-account" type="radio" class="inline" checked />Personal</label>
            <label for="personal-account"><input id="personal-account" type="radio" class="inline" />Business</label>
        </fieldset>
        <fieldset>
            <label for="profile-picture">Upload a profile picture <input id="profile-picture" type="file" name="file" /></label>
            <label for="age">Input your age (years): <input id="age" type="number" name="age" max="120" /></label>
            <label for="referrer"> How did you hear about us?
                <select id="referrer" name="referrer">
                    <option value="">(select one)</option>
                    <option value="1">Search Engine (Google, Bing etc.)</option>
                    <option value="2">Social Media</option>
                    <option value="3">Word of Mouth</option>
                    <option value="4">Other</option>
                </select>
            </label>
            <label for="bio">Provide a bio:
                <textarea id="bio" name="bio" rows="3" cols="30" place holder="I like coding on the beach..."></textarea> 
            </label>
            <label for="terms-and-conditions">
                <input class="inline" id="terms-and-conditions" type="checkbox" required name="terms-and-conditions" /> I accept the <a href="https://policies.google.com/terms?hl=th">terms and conditions</a>
            </label>
            <input type="submit" value="submit" />
        </fieldset>
    </form>
</body>
</html>
